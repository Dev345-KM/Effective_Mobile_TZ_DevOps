services:
  backend:
    build: ./backend
    container_name: em_backend
    restart: always
    networks:
      - em_net

  nginx:
    image: nginx:stable-alpine
    container_name: em_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
    networks:
      - em_net

networks:
  em_net:
    driver: bridge
